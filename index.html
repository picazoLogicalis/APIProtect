    // FUNCIÓN 1: Guardar datos (POST)
    async function guardarMensaje() {
        const input = document.getElementById('nuevoTexto');
        if (!input.value) return alert("Escribe algo");

        try {
            await fetch(API_URL, {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${MI_TOKEN}` // <--- Token agregado
                },
                body: JSON.stringify({ texto: input.value})
            });

            input.value = ''; 
            cargarMensajes(); 
        } catch (error) {
            console.error("Error al guardar:", error);
        }
    }

    // FUNCIÓN 2: Obtener datos (GET)
    async function cargarMensajes() {
        try {
            const res = await fetch(API_URL, {
                headers: {
                    'Authorization': `Bearer ${MI_TOKEN}` // <--- Token agregado
                }
            });
            
            if (!res.ok) throw new Error("Error en la respuesta de WSO2");

            const mensajes = await res.json();
            
            const contenedor = document.getElementById('listaMensajes');
            contenedor.innerHTML = mensajes.map(m => 
                `<div class="mensaje-item">${m.texto}</div>`
            ).reverse().join('');
        } catch (error) {
            console.error("Error al cargar:", error);
            document.getElementById('listaMensajes').innerHTML = "Error al conectar con WSO2";
        }
    }

    // Cargar al iniciar
    cargarMensajes();
